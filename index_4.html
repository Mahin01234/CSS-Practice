<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Animated Circular Login Form | Spinning Gradient Border</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- External CSS -->
    <link rel="stylesheet" href="Style_4.css">
</head>
<body>

<div class="circle-login">
    <!-- avatar icon -->
    <div class="avatar-ring">
        <i class="fas fa-user-astronaut"></i>
    </div>

    <!-- login form -->
    <form class="login-form" id="loginForm" action="#" method="post">
        <!-- username field -->
        <div class="input-field">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="Username" autocomplete="username" required>
        </div>

        <!-- email field -->
        <div class="input-field">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Email Address" autocomplete="email" required>
        </div>

        <!-- password field -->
        <div class="input-field">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
        </div>

        <!-- options row (Forgot Password only, centered) -->
        <div class="row-options" style="display: flex; justify-content: center; align-items: center;">
            <a href="#" class="forgot-pass" id="forgotBtn">Forgot Password?</a>
        </div>

        <!-- sign in button -->
        <button type="submit" class="signin-btn">
            <i class="fas fa-arrow-right-to-bracket"></i> SIGN IN
        </button>
    </form>
</div>

<!-- Demo JavaScript -->
<script>
    (function() {
        const form = document.getElementById('loginForm');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('username').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                if (!username || !email || !password) {
                    alert("❌ Please fill in all fields.");
                } else {
                    alert(`✅ Welcome ${username}!\nEmail: ${email}\n(This is a demo login.)`);
                }
            });
        }
        const forgotBtn = document.getElementById('forgotBtn');
        if (forgotBtn) {
            forgotBtn.addEventListener('click', function(e) {
                e.preventDefault();
                alert("🔐 Password recovery link would be sent (demo version).");
            });
        }
    })();
</script>
</body>
</html>
